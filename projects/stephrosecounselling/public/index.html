<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stephanie Rose Counselling</title>
  <meta name="description" content="Stephanie Rose Counselling — Coming Soon">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FAF8F5;
      --text: #3D3A37;
      --text-soft: #6B6863;
      --accent: #B5917B;
      --accent-soft: rgba(181, 145, 123, 0.4);
      --divider: rgba(61, 58, 55, 0.08);
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }

    .container {
      max-width: 480px;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 6vw, 2.8rem);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 24px auto;
    }

    .tagline {
      font-weight: 300;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 32px;
    }

    .description {
      font-weight: 300;
      font-size: 0.88rem;
      line-height: 1.8;
      color: var(--text-soft);
      margin-bottom: 40px;
    }

    .coming-soon {
      display: inline-block;
      font-weight: 400;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent-soft);
      padding: 10px 28px;
      border-radius: 2px;
    }

    .leaf {
      margin-top: 48px;
      font-size: 1.4rem;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">Stephanie Rose</h1>
    <div class="divider"></div>
    <p class="tagline">Counselling</p>
    <p class="description">
      A safe, supportive space for growth, healing, and self-discovery. Professional counselling grounded in warmth and understanding.
    </p>
    <span class="coming-soon">Coming Soon</span>
    <div class="leaf">🌿</div>
  </div>
</body>
</html>
